project:
  name: nichefate

paths:
  m3_edge_root: /home/zhutao/scratch/nichefate/m3/full_by_shard
  m3_manifest: /home/zhutao/scratch/nichefate/m3/reports/m3_full_m3_final_freeze_manifest.csv
  m3_schema: /home/zhutao/scratch/nichefate/m3/reports/m3_full_m3_final_schema.json
  m2_by_slice_root: /home/zhutao/scratch/nichefate/m2/by_slice
  output_root: /home/zhutao/scratch/nichefate/m4a
  reports_dir: /home/zhutao/scratch/nichefate/m4a/reports
  figures_dir: /home/zhutao/scratch/nichefate/m4a/reports/figures

assembly:
  edge_probability_column: row_normalized_transition_prob
  raw_weight_column: raw_edge_weight
  mass_adjusted_weight_column: mass_adjusted_weight
  source_id_column: source_anchor_id
  target_id_column: target_anchor_id
